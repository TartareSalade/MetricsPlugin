services:
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: minecraft
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21"
      MEMORY: "2G"
      ONLINE_MODE: "FALSE"
    volumes:
      - ./server:/data
      - ./plugins:/data/plugins
    stdin_open: true
    tty: true
